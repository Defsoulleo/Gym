<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DefSoul Hacker 3</title>

<style>
:root{
  --bg:#0a0c12;
  --card:#121520;
  --accent:#c8f135;
  --text:#e8eaf0;
  --muted:#6b7280;
  --line:#1f2433;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg);color:var(--text)}
.container{padding:16px;max-width:500px;margin:auto}

.header{display:flex;justify-content:space-between;margin-bottom:16px}
.logo{color:var(--accent);font-weight:800}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--card);padding:10px;border-radius:10px;text-align:center}
.stat span{font-size:11px;color:var(--muted)}
.stat strong{font-size:18px}

.tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.tabs button{padding:8px 12px;border:none;border-radius:10px;background:var(--card);color:var(--muted)}
.tabs .active{background:var(--accent);color:#000}

.progress{height:6px;background:var(--card);border-radius:99px;margin-bottom:12px}
.progress-bar{height:100%;background:var(--accent);width:0%}

.card{background:var(--card);padding:12px;border-radius:12px;margin-bottom:8px}
.exercise{display:flex;justify-content:space-between}

.check{width:26px;height:26px;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center}
.check.active{background:var(--accent);color:#000;animation:pop .2s}

@keyframes pop{0%{transform:scale(.8)}100%{transform:scale(1.1)}}

button.main{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);font-weight:700;margin-top:10px}

</style>
</head>
<body>

<div class="container">
<div class="header"><div class="logo">DEFSOUL</div></div>

<div class="stats">
<div class="stat"><span>Peso</span><strong id="peso">--</strong></div>
<div class="stat"><span>IMC</span><strong id="imc">--</strong></div>
<div class="stat"><span>Streak</span><strong id="streak">0</strong></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div id="list"></div>
<button class="main" onclick="finish()">Finalizar treino</button>
<button class="main" onclick="setPeso()">Atualizar peso</button>

</div>

<script>

const WORKOUTS={
  "Segunda":["Supino","Peck Deck","Tríceps"],
  "Terça":["Agachamento","Leg 45","Extensora"],
  "Quarta":["Remada","Barra fixa","Rosca"]
};

let current="Segunda";
let state=JSON.parse(localStorage.getItem('app')||"{}");

function save(){localStorage.setItem('app',JSON.stringify(state))}

function today(){return new Date().toISOString().split('T')[0]}

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  Object.keys(WORKOUTS).forEach(d=>{
    const b=document.createElement('button');
    b.textContent=d;
    if(d===current)b.classList.add('active');
    b.onclick=()=>{current=d;render()};
    el.appendChild(b);
  });
}

function render(){
  renderTabs();
  const list=document.getElementById('list');
  list.innerHTML='';

  const t=today();
  state.history=state.history||{};
  state.history[t]=state.history[t]||{};
  state.history[t][current]=state.history[t][current]||[];

  let done=state.history[t][current];

  WORKOUTS[current].forEach((ex,i)=>{
    const c=document.createElement('div');
    c.className='card';

    const row=document.createElement('div');
    row.className='exercise';

    const name=document.createElement('div');
    name.textContent=ex;

    const check=document.createElement('div');
    check.className='check'+(done.includes(i)?' active':'');
    check.innerHTML='✓';

    check.onclick=()=>{
      if(done.includes(i)) done=done.filter(x=>x!==i);
      else done.push(i);

      state.history[t][current]=done;
      save();
      render();
    };

    row.appendChild(name);
    row.appendChild(check);
    c.appendChild(row);
    list.appendChild(c);
  });

  updateBar(done.length);
  updateStats();
}

function updateBar(done){
  const total=WORKOUTS[current].length;
  document.getElementById('bar').style.width=(done/total*100)+'%';
}

function finish(){
  const t=today();
  state.history[t][current]=WORKOUTS[current].map((_,i)=>i);
  save();
  render();
  alert('Treino completo 🔥');
}

function calcIMC(p,a){return (p/((a/100)*(a/100))).toFixed(1)}

function setPeso(){
  const p=prompt('Peso:');
  const a=prompt('Altura:');
  if(!p||!a)return;
  state.profile={p,a};
  save();
  updateStats();
}

function getStreak(){
  const h=state.history||{};
  const days=Object.keys(h).sort().reverse();
  let s=0;
  let now=new Date();

  for(let i=0;i<days.length;i++){
    const d=new Date(days[i]);
    const diff=(now-d)/(1000*60*60*24);
    if(Math.floor(diff)===s) s++;
    else break;
  }
  return s;
}

function updateStats(){
  if(state.profile){
    document.getElementById('peso').textContent=state.profile.p+'kg';
    document.getElementById('imc').textContent=calcIMC(state.profile.p,state.profile.a);
  }
  document.getElementById('streak').textContent=getStreak();
}

render();

</script>

</body>
</html>
